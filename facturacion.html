
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AY-FA · Facturación</title>
<link rel="apple-touch-icon" href="icon-192.png">
<script src="config.js"></script>
<style>
:root{
  --navy:#1B2A55;--amber:#E8A33D;--paper:#F0F2F7;--white:#FFFFFF;
  --ink:#1C2230;--soft:#6B7280;--line:#E4E7EC;--red:#C0392B;--green:#1A7A45;
  --shadow:0 2px 12px rgba(27,42,85,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}

/* ── HEADER ── */
header{
  background:var(--navy);color:#fff;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:20;height:58px;
}
.hdr-left{display:flex;align-items:center;gap:12px;}
.hdr-logo{height:28px;}
.hdr-title{font-size:15px;font-weight:800;letter-spacing:.01em;}
.hdr-sub{font-size:11px;opacity:.7;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-btn{background:rgba(255,255,255,.14);border:none;color:#fff;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;}
.hdr-btn:hover{background:rgba(255,255,255,.22);}

/* ── TABS ── */
.tabs{
  display:flex;gap:6px;background:var(--white);border-bottom:1px solid var(--line);
  position:sticky;top:58px;z-index:15;padding:10px 12px;
}
.tab{
  flex:1;padding:10px 6px;text-align:center;font-size:12.5px;font-weight:700;color:var(--soft);
  border:none;border-radius:10px;background:var(--paper);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .15s ease,color .15s ease,box-shadow .15s ease;
}
.tab .tab-ico{font-size:14px;line-height:1;}
.tab:active{transform:scale(.97);}
.tab.active{background:var(--navy);color:#fff;box-shadow:0 3px 10px rgba(27,42,85,.28);}
.tab-badge{
  background:var(--amber);color:var(--navy);font-size:11px;font-weight:800;
  border-radius:999px;min-width:18px;height:18px;padding:0 5px;
  display:none;align-items:center;justify-content:center;
}
.tab-badge.show{display:inline-flex;}
.tab.active .tab-badge{background:rgba(255,255,255,.28);color:#fff;}

/* ── MAIN ── */
main{max-width:760px;margin:0 auto;padding:16px;padding-bottom:90px;}

/* ── STATS CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--white);border-radius:12px;padding:14px 12px;box-shadow:var(--shadow);}
.stat-num{font-size:22px;font-weight:800;color:var(--navy);}
.stat-lbl{font-size:11px;color:var(--soft);margin-top:2px;text-transform:uppercase;letter-spacing:.03em;}
.stat-card.highlight{background:var(--navy);color:#fff;}
.stat-card.highlight .stat-num{color:#fff;}
.stat-card.highlight .stat-lbl{color:rgba(255,255,255,.7);}

/* ── SECCION PENDIENTES ── */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sec-title{font-size:13px;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:.04em;}
.gen-todos-btn{
  background:var(--amber);color:var(--navy);border:none;border-radius:9px;
  padding:9px 16px;font-weight:800;font-size:13px;cursor:pointer;
}
.gen-todos-btn:disabled{opacity:.45;cursor:default;}

/* ── PEDIDO ROW ── */
.ped-card{
  background:var(--white);border-radius:12px;padding:14px;margin-bottom:10px;
  box-shadow:var(--shadow);border-left:4px solid var(--amber);
}
.ped-card.procesado{border-left-color:var(--green);opacity:.6;}
.ped-card.error{border-left-color:var(--red);}
.ped-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.ped-cliente{font-weight:800;font-size:15px;}
.ped-id{font-size:11.5px;color:var(--soft);margin-top:2px;}
.ped-total{font-weight:800;font-size:17px;color:var(--navy);white-space:nowrap;}
.ped-meta{font-size:12px;color:var(--soft);margin-top:4px;}
.ped-items{font-size:12px;color:var(--ink);margin-top:8px;line-height:1.6;background:var(--paper);border-radius:7px;padding:8px 10px;}
.ped-actions{display:flex;gap:8px;margin-top:10px;}
.btn-pdf{
  flex:1;padding:10px;border-radius:9px;border:none;cursor:pointer;
  background:var(--navy);color:#fff;font-weight:700;font-size:13px;
}
.btn-pdf:disabled{opacity:.45;cursor:default;}
.btn-ver{
  padding:10px 14px;border-radius:9px;border:1px solid var(--line);
  background:var(--white);color:var(--ink);font-size:13px;cursor:pointer;font-weight:600;
}

/* ── BUSCAR ── */
.search-bar{
  display:flex;gap:8px;margin-bottom:14px;
}
.search-bar input{
  flex:1;padding:10px 14px;border-radius:9px;border:1px solid var(--line);
  font-size:14px;background:var(--white);
}
.search-bar input:focus{outline:none;border-color:var(--navy);}

/* ── HISTORIAL ── */
.hist-card{
  background:var(--white);border-radius:12px;padding:14px;margin-bottom:10px;
  box-shadow:var(--shadow);border-left:4px solid var(--green);
}
.hist-card .ped-cliente{font-size:14px;}
.estado-badge{
  display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;margin-top:4px;
}
.estado-badge.impreso{background:#DCF0E5;color:#1A7A45;}
.estado-badge.pendiente{background:#FCEFD9;color:#9A6A1B;}
.estado-badge.facturado{background:#DCEAF7;color:#1C5F8C;}

/* ── FACTURADO TOGGLE ── */
.fact-toggle{
  display:flex;align-items:center;gap:9px;margin-top:10px;padding:10px 12px;
  border-radius:9px;border:1.5px solid var(--line);cursor:pointer;
  font-size:13px;font-weight:700;color:var(--soft);background:var(--white);
  transition:background .15s ease,border-color .15s ease,color .15s ease;
  -webkit-tap-highlight-color:transparent;
}
.fact-toggle:active{transform:scale(.99);}
.fact-toggle.checked{background:#DCEAF7;border-color:#1C5F8C;color:#1C5F8C;}
.fact-toggle .chk-box{
  width:19px;height:19px;border-radius:6px;border:2px solid var(--soft);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;
  transition:background .15s ease,border-color .15s ease;
}
.fact-toggle.checked .chk-box{background:#1C5F8C;border-color:#1C5F8C;}

/* ── ENTREGADO TOGGLE ── */
.entreg-toggle{
  display:flex;align-items:center;gap:9px;margin-top:8px;padding:10px 12px;
  border-radius:9px;border:1.5px solid var(--line);cursor:pointer;
  font-size:13px;font-weight:700;color:var(--soft);background:var(--white);
  transition:background .15s ease,border-color .15s ease,color .15s ease;
  -webkit-tap-highlight-color:transparent;
}
.entreg-toggle:active{transform:scale(.99);}
.entreg-toggle.checked{background:#EDE3F7;border-color:#6B3FA0;color:#6B3FA0;}
.entreg-toggle .chk-box{
  width:19px;height:19px;border-radius:6px;border:2px solid var(--soft);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;
  transition:background .15s ease,border-color .15s ease;
}
.entreg-toggle.checked .chk-box{background:#6B3FA0;border-color:#6B3FA0;}

/* ── DETALLE MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(20,24,34,.55);z-index:50;
  display:none;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:760px;
  max-height:85vh;overflow-y:auto;padding:20px;
}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:17px;font-weight:800;margin-bottom:4px;}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;color:var(--soft);cursor:pointer;}
.modal-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line);font-size:13px;}
.modal-total{display:flex;justify-content:space-between;padding:12px 0 0;font-weight:800;font-size:16px;color:var(--navy);}

/* ── EMPTY / HINT ── */
.empty{text-align:center;padding:40px 20px;color:var(--soft);font-size:14px;}
.empty .ico{font-size:36px;margin-bottom:10px;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;
  font-size:13px;z-index:99;opacity:0;pointer-events:none;transition:opacity .2s;
  max-width:90vw;text-align:center;white-space:nowrap;
}
.toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="hdr-left">
    <img src="logo-header.png" class="hdr-logo" onerror="this.style.display='none'">
    <div>
      <div class="hdr-title">AY-FA · Facturación</div>
      <div class="hdr-sub" id="hdrFecha"></div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" id="refreshBtn">↻ Actualizar</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tabPendientes">
    <span class="tab-ico">⏳</span><span>Pendientes</span>
    <span class="tab-badge" id="badgePendientes">0</span>
  </button>
  <button class="tab" id="tabProcesado">
    <span class="tab-ico">📦</span><span>Procesado</span>
  </button>
  <button class="tab" id="tabFinalizados">
    <span class="tab-ico">✅</span><span>Finalizados</span>
  </button>
</div>

<main>
  <!-- Stats -->
  <div class="stats-grid" id="statsGrid" style="display:none;">
    <div class="stat-card highlight">
      <div class="stat-num" id="statPendientes">0</div>
      <div class="stat-lbl">Pendientes</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statHoy">0</div>
      <div class="stat-lbl">Para preparar</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statTotal">$0</div>
      <div class="stat-lbl">Total del día</div>
    </div>
  </div>

  <!-- Buscar (solo en "Finalizados") -->
  <div class="search-bar" id="searchBar" style="display:none;">
    <input type="text" id="searchInput" placeholder="Buscar por cliente o ID...">
  </div>

  <!-- Botón generar todos -->
  <div class="sec-header" id="secHeader" style="display:none;">
    <span class="sec-title" id="secTitle">Pendientes</span>
    <button class="gen-todos-btn" id="genTodosBtn" disabled>Generar todos los PDF</button>
  </div>

  <div id="listaBody"><div class="empty"><div class="ico">⏳</div>Cargando...</div></div>
</main>

<!-- Modal detalle pedido -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" style="position:relative;">
    <div class="modal-handle"></div>
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const money = n => '$' + Number(n).toLocaleString('es-AR', {maximumFractionDigits:0});
const hoy = () => new Date().toDateString();

let claveAcceso = localStorage.getItem('ayfa_clave_facturacion') || '';
let todosPedidos = [];
let tabActiva = 'pendientes';
let busqueda = '';

// ── FECHA HEADER ──
const d = new Date();
$('hdrFecha').textContent = d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});

// ── TOAST ──
function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── AUTH ──
function pedirClave(msg){
  const v=(prompt(msg||'Ingresá la clave de facturación AyFa:')||'').trim();
  if(v){claveAcceso=v;localStorage.setItem('ayfa_clave_facturacion',v);}
  return v;
}

// ── API ──
function fetchT(url,opts,ms=15000){
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),ms);
  return fetch(url,Object.assign({},opts,{signal:c.signal})).finally(()=>clearTimeout(t));
}
async function apiGet(p){
  const go=()=>fetchT(API_URL+'?'+p+'&clave='+encodeURIComponent(claveAcceso)).then(r=>r.json());
  let res=await go();
  if(res&&res.error==='CLAVE_INVALIDA'){pedirClave('Clave incorrecta:');res=await go();}
  return res;
}
async function apiPost(payload){
  const go=()=>fetchT(API_URL,{method:'POST',body:JSON.stringify(Object.assign({},payload,{clave:claveAcceso}))}).then(r=>r.json());
  let res=await go();
  if(res&&res.error==='CLAVE_INVALIDA'){pedirClave('Clave incorrecta:');res=await go();}
  return res;
}

// ── DESCARGA PDF ──
function descargarPDF(base64,nombre){
  try{
    const b=atob(base64),arr=new Uint8Array(b.length);
    for(let i=0;i<b.length;i++)arr[i]=b.charCodeAt(i);
    const url=URL.createObjectURL(new Blob([arr],{type:'application/pdf'}));
    const a=document.createElement('a');a.href=url;a.download=nombre;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
    return true;
  }catch(e){return false;}
}

// ── CARGAR ──
async function cargar(){
  $('listaBody').innerHTML='<div class="empty"><div class="ico">⏳</div>Cargando...</div>';
  try{
    const res=await apiGet('action=pedidos');
    if(!Array.isArray(res)){$('listaBody').innerHTML='<div class="empty"><div class="ico">⚠️</div>No se pudo cargar.</div>';return;}
    todosPedidos=res;
    actualizarStats();
    render();
  }catch(e){
    $('listaBody').innerHTML='<div class="empty"><div class="ico">📵</div>Sin conexión. Revisá tu red.</div>';
  }
}

// ── STATS ──
function actualizarStats(){
  const pendientes=todosPedidos.filter(p=>!p.facturado);
  const paraPreparar=todosPedidos.filter(p=>p.facturado&&!p.entregado);
  const totalHoy=todosPedidos.filter(p=>new Date(p.fecha).toDateString()===hoy()).reduce((s,p)=>s+Number(p.total||0),0);
  $('statPendientes').textContent=pendientes.length;
  $('statHoy').textContent=paraPreparar.length;
  $('statTotal').textContent=money(totalHoy);
  $('statsGrid').style.display='grid';

  const badge=$('badgePendientes');
  badge.textContent=pendientes.length;
  badge.classList.toggle('show',pendientes.length>0);
}

// ── TABS ──
['tabPendientes','tabProcesado','tabFinalizados'].forEach(id=>{
  $(id).onclick=()=>{
    tabActiva=id==='tabPendientes'?'pendientes':id==='tabProcesado'?'procesado':'finalizados';
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    $(id).classList.add('active');
    $('searchBar').style.display=tabActiva==='finalizados'?'flex':'none';
    $('searchInput').value='';busqueda='';
    render();
  };
});

// ── BUSQUEDA ──
let searchTimeout;
$('searchInput').addEventListener('input',e=>{
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(()=>{busqueda=e.target.value.toLowerCase();render();},200);
});

// ── RENDER ──
function render(){
  const body=$('listaBody');
  let lista=[];
  if(tabActiva==='pendientes'){
    lista=todosPedidos.filter(p=>!p.facturado);
    $('secHeader').style.display='flex';
    $('secTitle').textContent=lista.length+' pedido(s) sin facturar';
    $('genTodosBtn').style.display='flex';
    $('genTodosBtn').disabled=!lista.length;
  } else if(tabActiva==='procesado'){
    lista=todosPedidos.filter(p=>p.facturado&&!p.entregado);
    $('secHeader').style.display='flex';
    $('secTitle').textContent=lista.length+' pedido(s) para preparar';
    $('genTodosBtn').disabled=true;
    $('genTodosBtn').style.display='none';
  } else {
    if(busqueda){
      lista=todosPedidos.filter(p=>
        String(p.cliente||'').toLowerCase().includes(busqueda)||
        String(p.id||'').toLowerCase().includes(busqueda)
      );
    } else {
      lista=todosPedidos.filter(p=>p.entregado);
    }
    $('secHeader').style.display='flex';
    $('secTitle').textContent=busqueda?lista.length+' resultado(s)':lista.length+' pedido(s) finalizado(s)';
    $('genTodosBtn').disabled=true;
    $('genTodosBtn').style.display='none';
  }

  if(!lista.length){
    const vacios={
      pendientes:'<div class="empty"><div class="ico">🎉</div>No hay pedidos sin facturar.</div>',
      procesado:'<div class="empty"><div class="ico">📭</div>No hay pedidos esperando preparación.</div>',
      finalizados:busqueda?'<div class="empty"><div class="ico">🔍</div>No se encontraron pedidos.</div>':'<div class="empty"><div class="ico">📭</div>Todavía no hay pedidos finalizados.</div>'
    };
    body.innerHTML=vacios[tabActiva];
    return;
  }

  body.innerHTML='';
  lista.forEach(p=>{
    const card=document.createElement('div');
    const esPendienteEstado=String(p.estado||'').trim()==='Pendiente';
    const esFacturado=!!p.facturado;
    const esEntregado=!!p.entregado;
    card.className=esEntregado?'hist-card':(esFacturado?'hist-card':'ped-card');
    const hora=new Date(p.fecha).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    const fecha=new Date(p.fecha).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'});
    const estadoBadge=`<span class="estado-badge ${String(p.estado||'').toLowerCase()}">${p.estado||''}</span>`;
    const itemsTxt=(p.items||[]).slice(0,4).map(it=>`${it.cantidad} × ${it.descripcion}`).join('\n');
    const masItems=(p.items||[]).length>4?`\n+ ${(p.items||[]).length-4} más...`:'';
    card.innerHTML=`
      <div class="ped-top">
        <div>
          <div class="ped-cliente">${p.cliente||'Sin nombre'}</div>
          <div class="ped-id">${p.id} · ${p.vendedor||''}</div>
          ${!esPendienteEstado?estadoBadge:''}
        </div>
        <div class="ped-total">${money(p.total)}</div>
      </div>
      <div class="ped-meta">📅 ${fecha} ${hora}</div>
      <div class="ped-items">${(itemsTxt+masItems).replace(/\n/g,'<br>')}</div>
      <div class="fact-toggle ${esFacturado?'checked':''}" id="fact-${p.id}">
        <span class="chk-box">${esFacturado?'✓':''}</span>
        <span>${esFacturado?'Facturado en Nacional Sistem':'Marcar facturado en Nacional Sistem'}</span>
      </div>
      ${esFacturado?`
      <div class="entreg-toggle ${esEntregado?'checked':''}" id="entreg-${p.id}">
        <span class="chk-box">${esEntregado?'✓':''}</span>
        <span>${esEntregado?'Entregado':'Marcar entregado'}</span>
      </div>`:''}
      <div class="ped-actions">
        ${esPendienteEstado?`<button class="btn-pdf" id="btn-${p.id}">📄 Generar PDF</button>`:''}
        <button class="btn-ver" onclick="verDetalle('${p.id}')">Ver detalle</button>
        ${!esPendienteEstado?`<button class="btn-pdf" onclick="regenerarPDF('${p.id}')">↻ Reimprimir</button>`:''}
      </div>
    `;
    if(esPendienteEstado){
      card.querySelector(`#btn-${p.id}`).onclick=()=>generarUno(p.id);
    }
    card.querySelector(`#fact-${p.id}`).onclick=()=>toggleFacturado(p.id);
    if(esFacturado){
      card.querySelector(`#entreg-${p.id}`).onclick=()=>toggleEntregado(p.id);
    }
    body.appendChild(card);
  });
}

// ── FACTURADO EN SISEM (checklist manual) ──
async function toggleFacturado(id){
  const p=todosPedidos.find(x=>x.id===id);
  if(!p)return;
  const nuevoValor=!p.facturado;
  p.facturado=nuevoValor; // optimista, se revierte si falla
  if(!nuevoValor)p.entregado=false; // si se desmarca facturado, tampoco puede seguir "entregado"
  actualizarStats();render();
  try{
    const res=await apiPost({action:'marcar_facturado',id,valor:nuevoValor});
    if(!res.ok){
      p.facturado=!nuevoValor;
      actualizarStats();render();
      showToast('Error: '+(res.error||'no se pudo actualizar'));
    }
  }catch(e){
    p.facturado=!nuevoValor;
    actualizarStats();render();
    showToast('Sin conexión, probá de nuevo');
  }
}

// ── ENTREGADO (checklist manual) ──
async function toggleEntregado(id){
  const p=todosPedidos.find(x=>x.id===id);
  if(!p)return;
  const nuevoValor=!p.entregado;
  p.entregado=nuevoValor; // optimista, se revierte si falla
  actualizarStats();render();
  try{
    const res=await apiPost({action:'marcar_entregado',id,valor:nuevoValor});
    if(!res.ok){
      p.entregado=!nuevoValor;
      actualizarStats();render();
      showToast('Error: '+(res.error||'no se pudo actualizar'));
    }
  }catch(e){
    p.entregado=!nuevoValor;
    actualizarStats();render();
    showToast('Sin conexión, probá de nuevo');
  }
}

// ── GENERAR PDF ──
async function generarUno(id){
  const btn=$(`#btn-${id}`)||document.querySelector(`[id="btn-${id}"]`);
  if(btn){btn.disabled=true;btn.textContent='Generando...';}
  try{
    const res=await apiPost({action:'generar_y_marcar_facturacion',id});
    if(!res.ok){
      showToast('Error: '+(res.error||'no se pudo generar'));
      if(btn){btn.disabled=false;btn.textContent='📄 Generar PDF';}
      return;
    }
    const ok=descargarPDF(res.pdfBase64,res.filename);
    if(!ok)window.open(res.driveUrl,'_blank');
    showToast('✅ PDF descargado — '+id);
    // Actualiza el estado local sin recargar todo
    const p=todosPedidos.find(x=>x.id===id);
    if(p)p.estado='Impreso';
    actualizarStats();
    render();
  }catch(e){
    showToast('Sin conexión, probá de nuevo');
    if(btn){btn.disabled=false;btn.textContent='📄 Generar PDF';}
  }
}

async function regenerarPDF(id){
  showToast('Regenerando PDF...');
  try{
    const res=await apiPost({action:'generar_pdf',id});
    if(!res.ok){showToast('Error: '+(res.error||''));return;}
    const ok=descargarPDF(res.pdfBase64,res.filename);
    if(!ok)window.open(res.driveUrl,'_blank');
    showToast('✅ PDF descargado — '+id);
  }catch(e){showToast('Sin conexión');}
}

// ── GENERAR TODOS ──
$('genTodosBtn').onclick=async()=>{
  const pendientes=todosPedidos.filter(p=>String(p.estado||'').trim()==='Pendiente');
  if(!pendientes.length)return;
  if(!confirm(`¿Generar PDF de los ${pendientes.length} pedidos pendientes?`))return;
  $('genTodosBtn').disabled=true;
  $('genTodosBtn').textContent='Generando...';
  let ok=0,err=0;
  for(const p of pendientes){
    try{
      const res=await apiPost({action:'generar_y_marcar_facturacion',id:p.id});
      if(res.ok){ok++;descargarPDF(res.pdfBase64,res.filename);p.estado='Impreso';await new Promise(r=>setTimeout(r,700));}
      else err++;
    }catch(e){err++;}
  }
  actualizarStats();render();
  $('genTodosBtn').textContent='Generar todos los PDF';
  showToast('✅ '+ok+' descargado(s)'+(err?` · ⚠️ ${err} con error`:''));
};

// ── VER DETALLE ──
function verDetalle(id){
  const p=todosPedidos.find(x=>x.id===id);
  if(!p)return;
  const hora=new Date(p.fecha).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
  let items='';
  (p.items||[]).forEach(it=>{
    items+=`<div class="modal-item"><span>${it.cantidad} × ${it.descripcion}</span><span>${money(it.cantidad*it.precio)}</span></div>`;
  });
  $('modalContent').innerHTML=`
    <div class="modal-title">${p.cliente||'Sin nombre'}</div>
    <div style="font-size:12px;color:var(--soft);margin-bottom:4px;">${p.id} · ${p.vendedor||''} · ${hora}</div>
    <div style="margin-bottom:12px;"><span class="estado-badge ${String(p.estado||'').toLowerCase()}">${p.estado||''}</span></div>
    ${p.direccion?`<div style="font-size:12px;color:var(--soft);margin-bottom:12px;">📍 ${p.direccion}</div>`:''}
    ${items}
    <div class="modal-total"><span>Total</span><span>${money(p.total)}</span></div>
  `;
  $('modalOverlay').classList.add('open');
}
$('modalClose').onclick=()=>$('modalOverlay').classList.remove('open');
$('modalOverlay').addEventListener('click',e=>{if(e.target.id==='modalOverlay')$('modalOverlay').classList.remove('open');});

// ── INIT ──
$('refreshBtn').onclick=cargar;
if(!claveAcceso)pedirClave();
cargar();
</script>
